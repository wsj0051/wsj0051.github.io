# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: wsj0051
subtitle: 'wsj0051的博客'
description: 'Never give up'
keywords:
author: wsj0051
language: zh-CN
timezone: ''

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: https://wsj0051.tk
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing index.html from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: api/**

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## Use post's date for updated date unless set in front-matter
use_date_for_updated: false

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:
# Extensions
plugins:
    hexo-generator-feed
#Feed Atom
feed:
    type: atom
    path: atom.xml
    limit: 20
search:
  path: search.xml
  field: post
  format: html
  limit: 10000    
#aplayer
aplayer:
  meting: true

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: Butterfly
##萌宠
live2d:
  enable: false
  scriptFrom: local
  model:
    use: live2d-widget-model-hijiki
  display:
    position: left
    width: 150
    height: 300
  mobile:
    show: false
#豆瓣    
douban:
  user: wsj0051
  builtin: true
  book:
    title: '我的豆瓣书籍'
    quote: '书籍清单'
  movie:
    title: '我的豆瓣电影'
    quote: '电影清单'
  game:
    title: '我的豆瓣游戏'
    quote: '游戏清单'
  timeout: 10000     

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
  type: git
  repo: 
      github: https://github.com/wsj0051/wsj0051.github.io.git
      gitee: git@gitee.com:wsj0051/wsj0051.git
  branch: master
# 备份博客  
backup:
  type: git
  theme: Butterfly
  message: Back up my hexo blog
  repository: 
      github: https://github.com/wsj0051/wsj0051.github.io.git,backup
